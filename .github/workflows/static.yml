<script>  
// =====================================================================  
//  ESTADO GLOBAL E CONTROLE DE TABS
// =====================================================================  
const state = {  
    rates: { selic: 10.75, cdi: 10.65, ipca: 4.50 }, // Taxas default seguras  
    chart: null,  
    isFetching: false,  
    lastResults: []  
};  

function switchTab(tab) {
    document.getElementById('tab-btn-rf').classList.remove('active');
    document.getElementById('tab-btn-val').classList.remove('active');
    document.getElementById('view-rf').style.display = 'none';
    document.getElementById('view-val').style.display = 'none';

    if (tab === 'rf') {
        document.getElementById('tab-btn-rf').classList.add('active');
        document.getElementById('view-rf').style.display = 'flex';
        recalc(); // Recalcula o gráfico caso o canvas tenha redimensionado
    } else {
        document.getElementById('tab-btn-val').classList.add('active');
        document.getElementById('view-val').style.display = 'flex';
        calcValuation();
    }
}
  
const fmtBRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });  
  
function fmtBRLShort(v) {  
    if (Math.abs(v) >= 1e6) return 'R$' + (v / 1e6).toFixed(2).replace('.', ',') + 'M';  
    if (Math.abs(v) >= 1e3) return 'R$' + (v / 1e3).toFixed(1).replace('.', ',') + 'k';  
    return fmtBRL.format(v);  
}  
  
// =====================================================================  
//  API BCB  
// =====================================================================  
async function fetchBCBData() {  
    if (state.isFetching) return;  
    state.isFetching = true;  
  
    const badge = document.getElementById('status-badge');  
    const icon  = document.getElementById('refresh-icon');  
  
    badge.textContent = 'Sincronizando...';  
    badge.className   = 'badge badge-sync loading-pulse';  
      
    let deg = 0;  
    const spin = setInterval(() => { deg = (deg + 15) % 360; icon.style.transform = `rotate(${deg}deg)`; }, 50);  
  
    const BCB = (code) => `https://api.bcb.gov.br/dados/serie/bcdata.sgs.${code}/dados/ultimos/1?formato=json`;  
  
    try {  
        const [sRes, iRes] = await Promise.all([  
            fetch(BCB(432)),   // Selic  
            fetch(BCB(13522))  // IPCA acumulado 12 meses  
        ]);  
  
        const [sData, iData] = await Promise.all([sRes.json(), iRes.json()]);  
  
        if (sData?.[0]?.valor) state.rates.selic = parseFloat(sData[0].valor);  
        state.rates.cdi = Math.max(0, state.rates.selic - 0.10);  
        if (iData?.[0]?.valor) state.rates.ipca = parseFloat(iData[0].valor);  
  
        badge.textContent = 'Online';  
        badge.className   = 'badge badge-online';  
        updateTickers();  
        recalc();  
    } catch (err) {  
        console.error('BCB API error:', err);  
        badge.textContent = 'Offline';  
        badge.className   = 'badge badge-offline';  
        recalc();  
    } finally {  
        state.isFetching = false;  
        clearInterval(spin);  
        icon.style.transform = 'rotate(0deg)';  
    }  
}  
  
function updateTickers() {  
    document.getElementById('top-selic').textContent = state.rates.selic.toFixed(2) + '% a.a.';  
    document.getElementById('top-cdi').textContent   = state.rates.cdi.toFixed(2) + '% a.a.';  
    document.getElementById('top-ipca').textContent  = state.rates.ipca.toFixed(2) + '% a.a.';  
}  
  
function handleCurrencyInput(el) {  
    const start = el.selectionStart;  
    const oldLen = el.value.length;  
  
    let digits = el.value.replace(/\D/g, '');  
    if (!digits) digits = '0';  
    digits = digits.padStart(3, '0');  
  
    const intPart = digits.slice(0, -2).replace(/^0+/, '') || '0';  
    const decPart = digits.slice(-2);  
    const formatted = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ',' + decPart;  
    el.value = formatted;  
  
    const newLen = el.value.length;  
    const diff = newLen - oldLen;  
    try { el.setSelectionRange(start + diff, start + diff); } catch (_) {}  
}  
  
function parseVal(id) {  
    const el = document.getElementById(id);
    if(!el) return 0;
    const raw = el.value;  
    return parseFloat(raw.replace(/\./g, '').replace(',', '.')) || 0;  
}  
  
// =====================================================================  
//  CÁLCULO DE IR (Tabela Regressiva Precisa)
// =====================================================================  
function getIRRate(months) {  
    const days = months * 30; // Aproximação segura para meses contábeis
    if (days <= 180) return 0.225;  
    if (days <= 360) return 0.20;  
    if (days <= 720) return 0.175;  
    return 0.15;  
}  
  
// =====================================================================  
//  SIMULAÇÃO DE RENDA FIXA
// =====================================================================  
function simulate(principal, monthly, months, config, useRealGain) {  
    let rate;  
  
    // Equação de Fisher aplicada caso "useRealGain" seja verdadeiro
    if (config.isIPCAplus) {  
        if (useRealGain) {  
            rate = config.fixedRate / 100; // Isola o IPCA, sobra apenas a taxa prefixada
        } else {  
            rate = ((1 + state.rates.ipca / 100) * (1 + config.fixedRate / 100)) - 1;  
        }  
    } else {  
        rate = config.annualRate / 100;  
        if (useRealGain && state.rates.ipca > 0) {  
            rate = ((1 + rate) / (1 + state.rates.ipca / 100)) - 1;  
        }  
    }  
  
    const monthlyRate = Math.pow(1 + rate, 1 / 12) - 1;  
  
    let totalGross = 0;  
    let totalIr = 0;  
    let invested = principal;  
    let runningBalance = principal;  
    const history = [principal];  
  
    // Lote 1: Aporte Inicial  
    let initialGross = principal * Math.pow(1 + monthlyRate, months);  
    totalGross += initialGross;  
    let initialProfit = Math.max(0, initialGross - principal);  
    totalIr += config.taxFree ? 0 : (initialProfit * getIRRate(months));  
  
    // Lotes subsequentes
    for (let m = 1; m <= months; m++) {  
        runningBalance = runningBalance * (1 + monthlyRate) + monthly;  
        history.push(runningBalance);  
  
        let timeInvested = months - m;   
        if (timeInvested > 0) {  
            let parcelGross = monthly * Math.pow(1 + monthlyRate, timeInvested);  
            totalGross += parcelGross;  
            invested += monthly;  
            let parcelProfit = Math.max(0, parcelGross - monthly);  
            totalIr += config.taxFree ? 0 : (parcelProfit * getIRRate(timeInvested));  
        } else {  
            totalGross += monthly;  
            invested += monthly;  
        }  
    }  
  
    const grossProfit = totalGross - invested;  
    const net = totalGross - totalIr;  
    const netProfit = net - invested;  
    const roi = invested > 0 ? (net / invested - 1) * 100 : 0;  
    const avgIrRate = grossProfit > 0 ? totalIr / grossProfit : 0;  
  
    return { net, netProfit, grossProfit, total: totalGross, invested, ir: totalIr, irRate: avgIrRate, history, roi };  
}  
  
// =====================================================================  
//  MAIN RECALC (RENDA FIXA)
// =====================================================================  
function recalc() {  
    const principal = parseVal('in-principal');  
    const monthly   = parseVal('in-monthly');  
    const timeVal   = parseInt(document.getElementById('in-time').value) || 0;  
    const unit      = document.getElementById('in-time-unit').value;  
    const months    = unit === 'years' ? timeVal * 12 : timeVal;  
  
    const cdbPerc      = parseInt(document.getElementById('in-cdb-perc').value);  
    const lciPerc      = parseInt(document.getElementById('in-lci-perc').value);  
    const criCdiPerc   = parseInt(document.getElementById('in-cricra-cdi').value); 
    const selicPerc    = parseInt(document.getElementById('in-selic-perc').value);  
    const ipcaRateVal  = parseInt(document.getElementById('in-ipca-rate').value) / 10;  
    const criIpcaVal   = parseInt(document.getElementById('in-cricra-ipca').value) / 10; 
    const debRateVal   = parseInt(document.getElementById('in-deb-rate').value) / 10;  
      
    const useReal   = document.getElementById('in-real-gain').checked;  
  
    document.getElementById('val-cdb-perc').textContent     = cdbPerc + '%';  
    document.getElementById('val-lci-perc').textContent     = lciPerc + '%';  
    document.getElementById('val-cricra-cdi').textContent   = criCdiPerc + '%';  
    document.getElementById('val-selic-perc').textContent   = selicPerc + '%';  
    document.getElementById('val-ipca-rate').textContent    = ipcaRateVal.toFixed(1) + '%';  
    document.getElementById('val-cricra-ipca').textContent  = criIpcaVal.toFixed(1) + '%'; 
    document.getElementById('val-deb-rate').textContent     = debRateVal.toFixed(1) + '%';  
  
    // TR aproximada baseada na Selic > 8.5
    const trEstimada = state.rates.selic > 8.5 ? 1.5 : 0;
    const poupRate = state.rates.selic > 8.5 ? (6.17 + trEstimada) : state.rates.selic * 0.70;  
  
    const investments = [  
        {  
            id: 'cdb', label: `CDB ${cdbPerc}% CDI`, shortLabel: 'CDB',  
            color: '#10b981', taxFree: false, annualRate: state.rates.cdi * (cdbPerc / 100)  
        },  
        {  
            id: 'lci', label: `LCI/LCA ${lciPerc}% CDI`, shortLabel: 'LCI/LCA',  
            color: '#0ea5e9', taxFree: true, annualRate: state.rates.cdi * (lciPerc / 100)  
        },  
        {  
            id: 'cricra_cdi', label: `CRI/CRA ${criCdiPerc}% CDI`, shortLabel: 'CRI/CRA (CDI)',  
            color: '#06b6d4', taxFree: true, annualRate: state.rates.cdi * (criCdiPerc / 100)  
        },  
        {  
            id: 'tesouro', label: `Tesouro Selic`, shortLabel: 'Ts. Selic',  
            color: '#8b5cf6', taxFree: false, annualRate: state.rates.selic * (selicPerc / 100)  
        },  
        {  
            id: 'tesouro-ipca', label: `Tesouro IPCA+ ${ipcaRateVal.toFixed(1)}%`, shortLabel: 'Ts. IPCA+',  
            color: '#f43f5e', taxFree: false, isIPCAplus: true, fixedRate: ipcaRateVal  
        },  
        {  
            id: 'cricra_ipca', label: `CRI/CRA IPCA+ ${criIpcaVal.toFixed(1)}%`, shortLabel: 'CRI/CRA (IPCA)',  
            color: '#f59e0b', taxFree: true, isIPCAplus: true, fixedRate: criIpcaVal  
        },
        {  
            id: 'debenture', label: `Debênture IPCA+ ${debRateVal.toFixed(1)}%`, shortLabel: 'Debênture',  
            color: '#ec4899', taxFree: true, isIPCAplus: true, fixedRate: debRateVal  
        },  
        {  
            id: 'poupanca', label: 'Poupança', shortLabel: 'Poupança',  
            color: '#a1a1aa', taxFree: true, annualRate: poupRate  
        }  
    ];  
  
    const results = investments.map(inv => ({  
        ...inv,  
        data: simulate(principal, monthly, months, inv, useReal)  
    }));  
  
    // Ordena decrescente por rentabilidade líquida  
    results.sort((a, b) => b.data.net - a.data.net);  
    state.lastResults = results;  
  
    document.getElementById('top-months').textContent =  
        months < 12 ? `${months} ${months === 1 ? 'mês' : 'meses'}` :  
        months % 12 === 0 ? `${months / 12} ${months / 12 === 1 ? 'ano' : 'anos'}` :  
        `${months} meses`;  
  
    renderHero(results[0], months);  
    renderComparison(results, months);  
    renderFiscal(results, months);  
    renderChart(results, months);  
}  

// =====================================================================  
//  BUSCA DE AÇÕES (VALUATION) - MOCK E ESTRUTURA PARA API
// ===================================================================== 
async function fetchStockData() {
    const ticker = document.getElementById('val-ticker').value.toUpperCase().trim();
    if (!ticker) return;

    const statusEl = document.getElementById('search-status');
    statusEl.style.display = 'block';
    statusEl.textContent = 'Buscando dados de ' + ticker + '...';
    statusEl.style.color = 'var(--sub)';

    // Simulando tempo de resposta da rede
    await new Promise(r => setTimeout(r, 800));

    /* * ATENÇÃO: Scrapear Fundamentus/StatusInvest direto pelo HTML causa erro de CORS.
     * Para funcionar na web real, você precisará de uma API ou backend proxy. 
     * Exemplo de como seria o fetch real com uma API (ex: brapi.dev ou proxy):
     * * try {
     * const res = await fetch(`https://sua-api.com/quote/${ticker}`);
     * const data = await res.json();
     * preencher(data.lpa, data.vpa, data.dividendo);
     * } catch (e) { erro() }
     */

    // Banco de Dados Simulado para demonstração imediata do Front-End funcionando:
    const mockDB = {
        'SANB11': { lpa: 2.85, vpa: 21.40, div: 1.50 },
        'PETR4':  { lpa: 6.50, vpa: 28.90, div: 7.20 },
        'VALE3':  { lpa: 8.10, vpa: 85.00, div: 6.50 },
        'ITUB4':  { lpa: 3.45, vpa: 18.20, div: 1.80 },
        'BBAS3':  { lpa: 11.20, vpa: 60.50, div: 4.80 },
        'WEGE3':  { lpa: 0.85, vpa: 4.20, div: 0.40 }
    };

    const data = mockDB[ticker];

    if (data) {
        // Função auxiliar para formatar em estilo brasileiro sem perder a lógica da máscara
        const fmtInp = (num) => num.toFixed(2).replace('.', ',');

        document.getElementById('val-lpa').value = fmtInp(data.lpa);
        document.getElementById('val-vpa').value = fmtInp(data.vpa);
        document.getElementById('val-div').value = fmtInp(data.div);

        statusEl.textContent = 'Dados atualizados com sucesso!';
        statusEl.style.color = '#34d399';

        calcValuation(); // Recalcula o Valuation automaticamente
    } else {
        statusEl.textContent = 'Ação não encontrada no banco local. (Conecte uma API real para busca completa)';
        statusEl.style.color = '#fb7185';
    }

    // Some a mensagem de sucesso após 3s
    setTimeout(() => {
        if (statusEl.textContent.includes('sucesso')) statusEl.style.display = 'none';
    }, 3500);
}


// =====================================================================  
//  VALUATION ENGINE (AÇÕES)
// ===================================================================== 
function calcValuation() {
    const lpa = parseVal('val-lpa');
    const vpa = parseVal('val-vpa');
    const div = parseVal('val-div');
    const yld = parseFloat(document.getElementById('val-yield').value) || 0;
    const g   = parseFloat(document.getElementById('val-g').value) || 0;
    const k   = parseFloat(document.getElementById('val-k').value) || 0;

    // 1. Fórmula de Graham: Raiz quadrada de (22.5 * LPA * VPA)
    const elGraham = document.getElementById('res-graham');
    if (lpa > 0 && vpa > 0) {
        let graham = Math.sqrt(22.5 * lpa * vpa);
        elGraham.textContent = fmtBRL.format(graham);
        elGraham.style.color = '#fff';
    } else {
        elGraham.textContent = 'N/A';
        elGraham.style.color = 'var(--rose-400)';
    }

    // 2. Décio Bazin (Preço-Teto por Yield)
    const elBazin = document.getElementById('res-bazin');
    if (yld > 0 && div > 0) {
        let bazin = div / (yld / 100);
        elBazin.textContent = fmtBRL.format(bazin);
        elBazin.style.color = '#fff';
    } else {
        elBazin.textContent = 'N/A';
        elBazin.style.color = 'var(--rose-400)';
    }

    // 3. Gordon Growth Model (DCF Simplificado)
    const elGordon = document.getElementById('res-gordon');
    if (k > g && div > 0) {
        // D1 = Div * (1 + crescimento)
        let gordon = (div * (1 + (g / 100))) / ((k / 100) - (g / 100));
        elGordon.textContent = fmtBRL.format(gordon);
        elGordon.style.color = '#fff';
    } else {
        elGordon.textContent = 'Inválido';
        elGordon.style.color = 'var(--rose-400)';
    }
}
  
function renderHero(best, months) {  
    const d = best.data;  
    document.getElementById('hero-net-value').textContent    = fmtBRL.format(d.net);  
    document.getElementById('hero-label').textContent        = `Melhor opção: ${best.label}`;  
    document.getElementById('hero-profit').textContent       = `+${fmtBRL.format(d.netProfit)}`;  
    document.getElementById('hero-invested').textContent     = fmtBRL.format(d.invested);  
    document.getElementById('hero-gross-profit').textContent = fmtBRL.format(d.grossProfit);  
    document.getElementById('hero-ir').textContent           = d.ir > 0 ? fmtBRL.format(d.ir) : 'Isento';  
}  
  
function renderComparison(results, months) {  
    const list = document.getElementById('comparison-list');  
      
    list.innerHTML = results.map((r, i) => {  
        const d = r.data;  
        const isUp = d.netProfit >= 0;  
        const isBest = i === 0;  
  
        let rateDisplay = r.isIPCAplus ? `IPCA + ${r.fixedRate.toFixed(2)}%` : `${r.annualRate.toFixed(2)}% a.a.`;  
  
        return `  
        <div class="comp-card ${isBest ? 'best' : ''}">  
            <div style="display:flex; align-items:center; gap:12px;">  
                <div class="rank" style="background:${r.color}22; color:${r.color}; font-family:'DM Mono',monospace;">  
                    ${i + 1}  
                </div>  
                <div>  
                    <p style="font-size:13px; font-weight:700; color:var(--text); line-height:1.2;">${r.label}</p>  
                    <p style="font-size:10px; color:var(--sub); margin-top:2px;">  
                        ${r.taxFree ? 'Isento de IR' : `Tributável`} · ${rateDisplay}  
                    </p>  
                </div>  
            </div>  
            <div style="text-align:right; flex-shrink:0;">  
                <p style="font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:#fff;">${fmtBRL.format(d.net)}</p>  
                <span class="profit-pill ${isUp ? 'profit-up' : 'profit-down'}" style="margin-top:4px; display:inline-block;">  
                    ${isUp ? '▲' : '▼'} ${Math.abs(d.roi).toFixed(2)}%  
                </span>  
            </div>  
        </div>`;  
    }).join('');  
}  
  
function renderFiscal(results, months) {  
    const container = document.getElementById('fiscal-summary');  
    container.innerHTML = results.map(r => `  
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border);">  
            <div style="display:flex; align-items:center; gap:8px;">  
                <div class="dot" style="background:${r.color};"></div>  
                <span style="font-size:12px; font-weight:700; color:var(--text);">${r.shortLabel}</span>  
            </div>  
            <div style="text-align:right;">  
                <span style="font-family:'DM Mono',monospace; font-size:12px; color:${r.data.ir > 0 ? '#fb923c' : '#34d399'};">  
                    ${r.data.ir > 0 ? fmtBRL.format(r.data.ir) : 'Isento'}  
                </span>  
                ${r.data.ir > 0 ? `<span style="font-size:9px; color:var(--sub); margin-left:6px;">(Alíq. Média: ${(r.data.irRate*100).toFixed(1)}%)</span>` : ''}  
            </div>  
        </div>  
    `).join('');  
}  
  
function renderChart(results, months) {  
    const ctx = document.getElementById('chartEvolution').getContext('2d');  
    const labels = Array.from({ length: months + 1 }, (_, i) => i);  
  
    document.getElementById('chart-legend').innerHTML = results.map(r => `  
        <div style="display:flex; align-items:center; gap:5px;">  
            <div class="legend-dot" style="background:${r.color};"></div>  
            <span style="font-size:10px; color:var(--sub); font-weight:600;">${r.shortLabel}</span>  
        </div>  
    `).join('');  
  
    if (state.chart) { state.chart.destroy(); }  
  
    state.chart = new Chart(ctx, {  
        type: 'line',  
        data: {  
            labels,  
            datasets: results.map((r, i) => ({  
                label: r.label,  
                data: r.data.history,  
                borderColor: r.color,  
                backgroundColor: i === 0 ? r.color + '18' : 'transparent',  
                fill: i === 0,  
                borderWidth: i === 0 ? 2.5 : 1.5,  
                pointRadius: 0,  
                tension: 0.35  
            }))  
        },  
        options: {  
            responsive: true, maintainAspectRatio: false,  
            interaction: { mode: 'index', intersect: false },  
            plugins: {  
                legend: { display: false },  
                tooltip: {  
                    backgroundColor: '#1c2c3d', borderColor: '#2b3f54', borderWidth: 1,  
                    titleColor: '#9bb1c8', bodyColor: '#e8f0f8',  
                    titleFont: { family: 'Syne', size: 10 }, bodyFont: { family: 'DM Mono', size: 11 },  
                    callbacks: {  
                        title: (items) => `Mês ${items[0].label}`,  
                        label: (item) => ` ${item.dataset.label}: ${fmtBRL.format(item.raw)}`  
                    }, padding: 10  
                }  
            },  
            scales: {  
                x: {  
                    grid: { color: 'rgba(43,63,84,0.4)' },  
                    ticks: { color: '#6e8fac', font: { size: 9, family: 'Syne' }, maxTicksLimit: 7, callback: (v, i) => (i % Math.ceil(months / 6) === 0) ? `M${v}` : '' }  
                },  
                y: {  
                    grid: { color: 'rgba(43,63,84,0.4)' },  
                    ticks: { color: '#6e8fac', font: { size: 9, family: 'DM Mono' }, callback: v => fmtBRLShort(v) }  
                }  
            }  
        }  
    });  
}  
  
window.addEventListener('load', () => {  
    document.querySelectorAll('button, input[type="range"]').forEach(el => {  
        el.addEventListener('touchstart', () => {  
            try { if (navigator.vibrate) navigator.vibrate(5); } catch (_) {}  
        }, { passive: true });  
    });  
    updateTickers();  
    recalc();  
    calcValuation();
    fetchBCBData();  
});  
</script>  
</body>  
